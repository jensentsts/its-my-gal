<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="../../">
    <title>剧情树节点编辑器</title>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- JSZip（资源包 ZIP 导入/导出） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- 编辑器样式 -->
    <link rel="stylesheet" href="projects/editor/editor-styles.css">
</head>
<body>
    <div id="editor-app" v-cloak @contextmenu.prevent="onGlobalContextMenu" @click="closeAllMenus">

        <!-- ============================================================ -->
        <!--  Datalist 定义（供子组件中的输入框使用）                      -->
        <!-- ============================================================ -->
        <datalist id="dl-char-ids">
            <option v-for="(ch, cid) in gameCharacters" :key="cid" :value="cid">{{ ch.name }}</option>
        </datalist>
        <datalist id="dl-scene-ids">
            <option v-for="(sc, sid) in gameScenes" :key="sid" :value="sid">{{ sc.title }}</option>
        </datalist>
        <datalist id="dl-cg-ids">
            <option v-for="(cg, cgid) in gameCgLibrary" :key="cgid" :value="cgid">{{ cg.title }}</option>
        </datalist>
        <datalist id="dl-item-ids">
            <option v-for="(item, iid) in gameItems" :key="iid" :value="iid">{{ item.name }}</option>
        </datalist>
        <datalist id="dl-anims">
            <option value="fade-in"><option value="fade-out">
            <option value="slide-in-left"><option value="slide-in-right"><option value="slide-in-up"><option value="slide-in-down">
            <option value="slide-out-left"><option value="slide-out-right"><option value="slide-out-up"><option value="slide-out-down">
            <option value="bounce-in"><option value="bounce-out">
            <option value="zoom-in"><option value="zoom-out">
            <option value="flip-in"><option value="flip-out">
            <option value="drop-in"><option value="float-in"><option value="stumble-in"><option value="swing-in">
            <option value="shrink-out"><option value="vanish">
            <option value="shake"><option value="flash"><option value="glow"><option value="float">
            <option value="pulse"><option value="tremble"><option value="blur"><option value="highlight"><option value="shine"><option value="dizzy">
            <option value="swap"><option value="slide-left"><option value="slide-right">
            <option value="action-wave"><option value="action-bow"><option value="action-nod">
            <option value="action-jump"><option value="action-fall"><option value="action-turn">
        </datalist>
        <datalist id="dl-positions">
            <option value="center"><option value="left"><option value="right">
            <option value="left-far"><option value="center-left">
            <option value="center-right"><option value="right-far">
        </datalist>

        <!-- ============================================================ -->
        <!--  顶部工具栏                                                  -->
        <!-- ============================================================ -->
        <editor-toolbar></editor-toolbar>

        <!-- ============================================================ -->
        <!--  主编辑区域 + 边栏系统                                        -->
        <!-- ============================================================ -->
        <div class="editor-body-area">

            <!-- 左边栏 -->
            <div class="dock-area dock-area-left" :class="{ 'dock-empty': !docks.left.length }"
                 v-if="docks.left.length">
                <div class="dock-inner">
                    <div class="dock-tab-bar">
                        <template v-for="(entry, idx) in docks.left" :key="entry.id">
                            <div class="dock-tab" :class="{ active: dockActiveIdx.left === idx }"
                                 @click="setDockActive('left', idx)">
                                <span class="dock-tab-drag" @mousedown.stop="startDockItemDrag($event, 'left', idx)">⠿</span>
                                <span>{{ entry.icon }} {{ entry.title }}</span>
                                <span class="dock-tab-actions">
                                    <button class="dock-tab-btn dock-tab-btn-pop" title="弹出为窗口" @click.stop="undockDockItem('left', idx)">⤴</button>
                                    <button class="dock-tab-btn dock-tab-btn-close" title="关闭" @click.stop="closeWindow(entry.id); undockDockItem('left', idx)">✕</button>
                                </span>
                            </div>
                        </template>
                    </div>
                    <div class="dock-content">
                        <terminal-panel v-if="dockActiveIdx.left >= 0 && docks.left[dockActiveIdx.left]?.id === 'terminal'"></terminal-panel>
                        <div v-if="dockActiveIdx.left >= 0 && docks.left[dockActiveIdx.left]?.id === 'resourceManager'"
                             class="resource-body" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
                            <div v-html="'<i>资源管理器已停靠到左边栏</i>'"></div>
                        </div>
                        <div v-if="dockActiveIdx.left >= 0 && docks.left[dockActiveIdx.left]?.id === 'gameSettings'"
                             class="modal-body" style="flex:1;overflow-y:auto">
                            <i>游戏设置已停靠到左边栏</i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 中央主栏（树 + 详情 + 底边栏） -->
            <div class="editor-main-wrapper">
                <div class="editor-main">
                    <tree-canvas></tree-canvas>

                    <!-- 步骤编辑面板拖拽手柄 -->
                    <div class="resize-handle-vertical" v-if="editingStep && selectedChapterId"
                         @mousedown="startStepDetailResize($event)" style="flex-shrink:0"></div>
                    <step-detail-panel></step-detail-panel>

                    <!-- 面板拖拽手柄 -->
                    <div class="panel-resize-handle" v-if="(selectedChapterId || selectedEndingId || selectedGroupId) && !detailPanelCollapsed"
                         @mousedown="startPanelResize" title="拖动调整面板宽度">
                        <div class="panel-resize-corner" @mousedown.stop="startPanelResizeCorner($event)"
                             title="拖动调整大小"></div>
                    </div>

                    <detail-panel></detail-panel>
                </div>

                <!-- 底边栏 -->
                <div class="dock-area dock-area-bottom" :class="{ 'dock-empty': !docks.bottom.length }"
                     v-if="docks.bottom.length">
                    <div class="dock-inner">
                        <div class="dock-tab-bar">
                            <template v-for="(entry, idx) in docks.bottom" :key="entry.id">
                                <div class="dock-tab" :class="{ active: dockActiveIdx.bottom === idx }"
                                     @click="setDockActive('bottom', idx)">
                                    <span class="dock-tab-drag" @mousedown.stop="startDockItemDrag($event, 'bottom', idx)">⠿</span>
                                    <span>{{ entry.icon }} {{ entry.title }}</span>
                                    <span class="dock-tab-actions">
                                        <button class="dock-tab-btn dock-tab-btn-pop" title="弹出为窗口" @click.stop="undockDockItem('bottom', idx)">⤴</button>
                                        <button class="dock-tab-btn dock-tab-btn-close" title="关闭" @click.stop="closeWindow(entry.id); undockDockItem('bottom', idx)">✕</button>
                                    </span>
                                </div>
                            </template>
                        </div>
                        <div class="dock-content">
                            <terminal-panel v-if="dockActiveIdx.bottom >= 0 && docks.bottom[dockActiveIdx.bottom]?.id === 'terminal'"></terminal-panel>
                            <div v-if="dockActiveIdx.bottom >= 0 && docks.bottom[dockActiveIdx.bottom]?.id === 'resourceManager'"
                                 class="resource-body" style="flex:1"><i>资源管理器已停靠到底边栏</i></div>
                            <div v-if="dockActiveIdx.bottom >= 0 && docks.bottom[dockActiveIdx.bottom]?.id === 'gameSettings'"
                                 class="modal-body" style="flex:1"><i>游戏设置已停靠到底边栏</i></div>
                        </div>
                    </div>
                </div>

            </div><!-- /editor-main-wrapper -->

            <!-- 右边栏 -->
            <div class="dock-area dock-area-right" :class="{ 'dock-empty': !docks.right.length }"
                 v-if="docks.right.length">
                <div class="dock-inner">
                    <div class="dock-tab-bar">
                        <template v-for="(entry, idx) in docks.right" :key="entry.id">
                            <div class="dock-tab" :class="{ active: dockActiveIdx.right === idx }"
                                 @click="setDockActive('right', idx)">
                                <span class="dock-tab-drag" @mousedown.stop="startDockItemDrag($event, 'right', idx)">⠿</span>
                                <span>{{ entry.icon }} {{ entry.title }}</span>
                                <span class="dock-tab-actions">
                                    <button class="dock-tab-btn dock-tab-btn-pop" title="弹出为窗口" @click.stop="undockDockItem('right', idx)">⤴</button>
                                    <button class="dock-tab-btn dock-tab-btn-close" title="关闭" @click.stop="closeWindow(entry.id); undockDockItem('right', idx)">✕</button>
                                </span>
                            </div>
                        </template>
                    </div>
                    <div class="dock-content">
                        <terminal-panel v-if="dockActiveIdx.right >= 0 && docks.right[dockActiveIdx.right]?.id === 'terminal'"></terminal-panel>
                        <div v-if="dockActiveIdx.right >= 0 && docks.right[dockActiveIdx.right]?.id === 'resourceManager'"
                             class="resource-body" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
                            <div v-html="'<i>资源管理器已停靠到右边栏</i>'"></div>
                        </div>
                        <div v-if="dockActiveIdx.right >= 0 && docks.right[dockActiveIdx.right]?.id === 'gameSettings'"
                             class="modal-body" style="flex:1;overflow-y:auto">
                            <i>游戏设置已停靠到右边栏</i>
                        </div>
                    </div>
                </div>
            </div>

        </div><!-- /editor-body-area -->

        <!-- 贴靠预览 -->
        <div class="snap-preview-overlay" v-if="snapPreview.active">
            <div class="snap-preview-rect" :style="{
                left: (snapPreview.rect?.left || 0) + 'px',
                top: (snapPreview.rect?.top || 0) + 'px',
                width: (snapPreview.rect?.width || 0) + 'px',
                height: (snapPreview.rect?.height || 0) + 'px'
            }"></div>
        </div>

        <!-- ============================================================ -->
        <!--  终端窗口 Ctrl+` 切换                                         -->
        <!-- ============================================================ -->
        <div class="editor-window" :class="{ 'window-is-maximized': windows.terminal?.maximized }"
             v-if="windows.terminal?.visible && !isDocked('terminal')" :style="getWindowStyle('terminal')"
             @mousedown="focusWindow('terminal')">
            <div class="window-resize-overlay">
                <div class="wr-edge-n" @mousedown.stop="startWindowResize($event, 'terminal', 'n')"></div>
                <div class="wr-edge-s" @mousedown.stop="startWindowResize($event, 'terminal', 's')"></div>
                <div class="wr-edge-w" @mousedown.stop="startWindowResize($event, 'terminal', 'w')"></div>
                <div class="wr-edge-e" @mousedown.stop="startWindowResize($event, 'terminal', 'e')"></div>
                <div class="wr-corner-nw" @mousedown.stop="startWindowResize($event, 'terminal', 'nw')"></div>
                <div class="wr-corner-ne" @mousedown.stop="startWindowResize($event, 'terminal', 'ne')"></div>
                <div class="wr-corner-sw" @mousedown.stop="startWindowResize($event, 'terminal', 'sw')"></div>
                <div class="wr-corner-se" @mousedown.stop="startWindowResize($event, 'terminal', 'se')"></div>
            </div>
            <div class="window-header" @mousedown.stop="startWindowDrag($event, 'terminal')">
                <span class="window-header-title">>_ 终端</span>
                <div class="window-header-actions">
                    <button class="window-btn window-btn-maximize" @click.stop="toggleMaximize('terminal')"
                            :title="windows.terminal?.maximized ? '还原' : '全屏'">
                        {{ windows.terminal?.maximized ? '⤡' : '⤢' }}
                    </button>
                    <button class="window-btn window-btn-close" @click.stop="toggleTerminal" title="关闭">✕</button>
                </div>
            </div>
            <terminal-panel></terminal-panel>
        </div>

        <!-- ============================================================ -->
        <!--  游戏调试窗口（浮动）                                         -->
        <!-- ============================================================ -->
        <div class="editor-window" :class="{ 'window-is-maximized': windows.gameDebug?.maximized }"
             v-if="windows.gameDebug?.visible && !isDocked('gameDebug')" :style="getWindowStyle('gameDebug')"
             @mousedown="focusWindow('gameDebug')">
            <div class="window-resize-overlay">
                <div class="wr-edge-n" @mousedown.stop="startWindowResize($event, 'gameDebug', 'n')"></div>
                <div class="wr-edge-s" @mousedown.stop="startWindowResize($event, 'gameDebug', 's')"></div>
                <div class="wr-edge-w" @mousedown.stop="startWindowResize($event, 'gameDebug', 'w')"></div>
                <div class="wr-edge-e" @mousedown.stop="startWindowResize($event, 'gameDebug', 'e')"></div>
                <div class="wr-corner-nw" @mousedown.stop="startWindowResize($event, 'gameDebug', 'nw')"></div>
                <div class="wr-corner-ne" @mousedown.stop="startWindowResize($event, 'gameDebug', 'ne')"></div>
                <div class="wr-corner-sw" @mousedown.stop="startWindowResize($event, 'gameDebug', 'sw')"></div>
                <div class="wr-corner-se" @mousedown.stop="startWindowResize($event, 'gameDebug', 'se')"></div>
            </div>
            <div class="window-header" @mousedown.stop="startWindowDrag($event, 'gameDebug')">
                <span class="window-header-title">🎮 游戏调试</span>
                <div class="window-header-actions">
                    <button class="window-btn window-btn-maximize" @click.stop="toggleMaximize('gameDebug')"
                            :title="windows.gameDebug?.maximized ? '还原' : '全屏'">
                        {{ windows.gameDebug?.maximized ? '⤡' : '⤢' }}
                    </button>
                    <button class="window-btn window-btn-close" @click.stop="closeGameDebug" title="关闭">✕</button>
                </div>
            </div>
            <div id="game-debug-container" class="game-debug-body"></div>
        </div>

        <!-- ============================================================ -->
        <!--  游戏设置窗口（浮动）                                         -->
        <!-- ============================================================ -->
        <game-settings-window></game-settings-window>

        <!-- ============================================================ -->
        <!--  资源管理窗口（浮动）                                         -->
        <!-- ============================================================ -->
        <resource-manager-window></resource-manager-window>

        <!-- ============================================================ -->
        <!--  导出弹窗                                                     -->
        <!-- ============================================================ -->
        <export-modal></export-modal>

        <!-- ============================================================ -->
        <!--  全局右键菜单                                                -->
        <!-- ============================================================ -->
        <global-context-menu></global-context-menu>

        <!-- ============================================================ -->
        <!--  Toast 通知                                                  -->
        <!-- ============================================================ -->
        <toast-notification></toast-notification>

    </div>

    <!-- 编辑器应用入口 -->
    <script type="module" src="projects/editor/editor-app.js"></script>
</body>
</html>
