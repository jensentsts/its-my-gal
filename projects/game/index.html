<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <base href="../../">
    <title>Galgame</title>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- JSZip（资源包 ZIP 导入支持） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- 样式表（按层级加载） -->
    <link rel="stylesheet" href="projects/game/app/styles/base.css">
    <link rel="stylesheet" href="projects/game/app/styles/effects.css">
    <link rel="stylesheet" href="projects/game/app/styles/game.css">
    <link rel="stylesheet" href="projects/game/app/styles/menu.css">

    <script>
    // 阻止旧版缓存/扩展注入的内容脚本干扰
    // 捕获并静默处理 classList 等 DOM 属性访问错误
    window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('classList')) {
            console.warn('[Guard] 捕获到 classList 访问错误，可能来自外部脚本:', e.filename);
            e.preventDefault();
            return true;
        }
    }, true);
    window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && e.reason.message.includes('classList')) {
            console.warn('[Guard] 捕获到异步 classList 错误，可能来自外部脚本:', e.reason);
            e.preventDefault();
            return true;
        }
    });
    </script>
</head>
<body>
    <div id="app" v-cloak>

        <!-- ============================================================ -->
        <!--  拆分后的模块化组件                                           -->
        <!-- ============================================================ -->
        <toast-notification></toast-notification>
        <lightbox></lightbox>
        <dialog-box></dialog-box>
        <menu-view></menu-view>
        <game-view></game-view>

    </div>

    <!-- 应用入口（ES Module） -->
    <script type="module" src="projects/game/app/app.js"></script>
</body>
</html>
